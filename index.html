<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Quiz Game</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-dark">
    <header class="app-header">
        <h1 class="logo" id="logoTitle">CharQuiz</h1>
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <nav class="nav-links" id="navLinks">
            <button class="nav-btn" data-target="home">Home</button>
            <button class="nav-btn" data-target="gallery">Gallery</button>
            <button class="nav-btn" id="randomCharBtn">Surprise Me</button>
            <button class="nav-btn" id="syncBtn" title="Sync Data">Sync</button>
            <button class="theme-toggle" id="themeToggleBtn" title="Toggle Theme">☀️</button>
        </nav>
    </header>

    <!-- Main Container -->
    <main id="appContainer">
        <!-- Home Screen -->
        <section id="screen-home" class="screen active" style="padding-top: 5rem;">
            <div class="category-grid" id="homeCategoryGrid">
                <!-- Dynamite cards inserted here -->
            </div>
        </section>

        <!-- Gallery Screen -->
        <section id="screen-gallery" class="screen hidden">
            <div class="gallery-controls">
                <input type="text" id="gallerySearch" placeholder="Search characters...">
                <div class="filter-pills" id="galleryFilters">
                    <button class="pill active" data-filter="All">All</button>
                    <button class="pill" data-filter="Slut">Slut</button>
                    <button class="pill" data-filter="Twink">Twink</button>
                    <button class="pill" data-filter="Shemale">Shemale</button>
                </div>
                <button class="btn-primary" id="openManagerBtn">Add Character</button>
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
        </section>

        <!-- Game Config Screen / Modal -->
        <section id="screen-config" class="screen hidden">
            <div class="config-container glass-card">
                <h2 id="configCategoryTitle">Category Mode</h2>
                <div class="config-options">
                    <h3>Select Rounds</h3>
                    <div class="rounds-selector" id="roundsSelector">
                        <label><input type="radio" name="rounds" value="10" checked><span>10</span></label>
                        <label><input type="radio" name="rounds" value="15"><span>15</span></label>
                        <label><input type="radio" name="rounds" value="20"><span>20</span></label>
                        <label><input type="radio" name="rounds" value="25"><span>25</span></label>
                        <label><input type="radio" name="rounds" value="Infinite"><span>Infinite</span></label>
                    </div>
                </div>
                <button class="btn-primary" id="startGameBtn">Start Game</button>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="screen-game" class="screen hidden">
            <div class="game-topbar">
                <div class="progress-bar"><div id="gameProgressFill"></div></div>
                <div class="stats">
                    <span class="stat-round">Round <span id="currentRound">1</span></span>
                    <span class="stat-streak">Streak <span id="currentStreak">0</span></span>
                </div>
            </div>
            <div class="game-area">
                <div class="image-frame glass-card">
                    <img id="gameImage" src="" alt="Character">
                </div>
                <div class="options-grid" id="gameOptions"></div>
            </div>
        </section>

        <!-- Results Screen -->
        <section id="screen-results" class="screen hidden">
            <div class="results-card glass-card">
                <h2>Quiz Complete</h2>
                <div class="metrics">
                    <div class="metric"><span>Score</span><strong id="finalScore">0</strong></div>
                    <div class="metric"><span>Max Streak</span><strong id="maxStreak">0</strong></div>
                    <div class="metric highlight"><span>All-Time High</span><strong id="highScore">0</strong></div>
                </div>
                <div class="mistakes-review">
                    <h3>Review Mistakes</h3>
                    <div id="mistakesList"></div>
                </div>
                <button class="btn-primary" id="playAgainBtn">Play Again</button>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <!-- Image Modal -->
    <div id="imageModal" class="modal hidden">
        <div class="modal-backdrop" id="imageModalBackdrop"></div>
        <div class="modal-content image-modal-content">
            <img id="globalModalImage" src="" alt="Full Resolution">
            <button class="modal-close" id="closeImageModal">&times;</button>
        </div>
    </div>

    <!-- Random Character Modal -->
    <div id="randomModal" class="modal hidden">
        <div class="modal-backdrop" id="randomModalBackdrop"></div>
        <div class="modal-content glass-card" style="text-align: center; max-width: 400px; padding: 2rem;">
            <button class="modal-close" id="closeRandomModal" style="position: absolute; right: 1rem; top: 1rem;">&times;</button>
            <h2 style="margin-bottom: 1rem; color: var(--primary);">Random Match!</h2>
            <div class="char-item" style="cursor: default; pointer-events: none; margin: 0 auto 1.5rem auto; max-width: 250px;">
                <img id="randomModalImage" src="" alt="Random Character">
                <div class="char-item-info">
                    <strong id="randomModalName">Name</strong>
                    <span id="randomModalCategory">Category</span>
                </div>
            </div>
            <button class="btn-primary w-full" id="randomCharRollBtn" style="width: 100%;">Roll Again 🎲</button>
        </div>
    </div>

    <!-- Manager Modal (Add / Import) -->
    <div id="managerModal" class="modal hidden">
        <div class="modal-backdrop" id="managerModalBackdrop"></div>
        <div class="modal-content glass-card" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Add Character</h2>
                <button class="modal-close" id="closeManagerModal">&times;</button>
            </div>
            <div class="manager-body" style="grid-template-columns: 1fr;">
                <div class="manager-section">
                    <form id="addCharacterForm" class="add-form">
                        <div class="form-group">
                            <input type="text" id="addName" placeholder="Character Name" required>
                        </div>
                        <div class="form-group">
                            <select id="addCategory" required>
                                <option value="" disabled selected>Select Category...</option>
                                <option value="Slut">Slut</option>
                                <option value="Twink">Twink</option>
                                <option value="Shemale">Shemale</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <input type="url" id="addUrl" placeholder="Image URL (e.g. https://...)" required>
                        </div>
                        <button type="submit" class="btn-primary w-full">Add Character</button>
                    </form>
                    
                    <div class="data-actions-container" style="margin-top: 2rem;">
                        <h3 style="font-size: 1rem; color: var(--text-muted); padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-glass); margin-bottom: 1rem;">Data Backup</h3>
                        <div class="data-actions">
                            <button class="btn-secondary" id="exportDataBtn">Export JSON</button>
                            <label class="btn-secondary import-label">
                                Import JSON
                                <input type="file" id="importDataInput" accept=".json" hidden>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Character Modal -->
    <div id="editModal" class="modal hidden">
        <div class="modal-backdrop" id="editModalBackdrop"></div>
        <div class="modal-content glass-card" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Edit Character</h2>
                <button class="modal-close" id="closeEditModal">&times;</button>
            </div>
            <div class="manager-body" style="grid-template-columns: 1fr;">
                <form id="editCharacterForm" class="add-form">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <input type="text" id="editName" placeholder="Character Name" required>
                    </div>
                    <div class="form-group">
                        <select id="editCategory" required>
                            <option value="Slut">Slut</option>
                            <option value="Twink">Twink</option>
                            <option value="Shemale">Shemale</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="url" id="editUrl" placeholder="Image URL (e.g. https://...)" required>
                    </div>
                    <button type="submit" class="btn-primary w-full" style="background: var(--success);">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>
    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas" class="hidden"></canvas>
